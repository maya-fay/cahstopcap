<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CahStopCap - Owner Login</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/admin.css" />
</head>
<body class="index admin-body">

  <div class="admin-login-page">
    <div class="admin-login-card">
      <a href="/"><img src="/static/logo.png" alt="CahStopCap Logo" class="admin-login-logo" /></a>
      <h2>Owner Login</h2>

      {% if error %}
      <p class="admin-login-error">{{ error }}</p>
      {% endif %}

      <form method="post" action="/admin/login" class="admin-login-form">
        <label>
          Password
          <input type="password" name="password" required autofocus />
        </label>
        <button type="submit" class="button">Log In</button>
      </form>
    </div>
  </div>

</body>
</html>
