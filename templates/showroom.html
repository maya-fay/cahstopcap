<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CahStopCap - Showroom</title>
  <link rel="stylesheet" href="static/styles.css" />
  <link rel="stylesheet" href="static/showroom.css" />
</head>
<body class="index">

  <!-- HEADER -->
  <header>
    <nav class="header-nav">
      <div class="nav-item">
        <span class="nav-text"><a href="/showroom">Shop</a></span>
        <span class="nav-icon"><a href="/showroom"><img src="/static/assets/shop.png" alt="Shop"></a></span>
      </div>
      <div class="nav-item">
        <span class="nav-text"><a href="#about">About</a></span>
        <span class="nav-icon"><a href="#about"><img src="/static/assets/about.png" alt="About"></a></span>
      </div>
      <div class="nav-item">
        <span class="nav-text"><a href="/contact">Contact</a></span>
        <span class="nav-icon"><a href="/contact"><img src="/static/assets/contact.png" alt="Contact"></a></span>
      </div>
    </nav>
    <div class="header-logo">
      <a href="/"><img src="/static/logo.png" alt="CahStopCap Logo"></a>
    </div>
  </header>

  <!-- MARQUEE -->
  <div class="marquee">
    <span> YDYS YDYS YDYS YDYS YDYS YDYS YDYS YDYS YDYS </span>
  </div>

  <!-- SHOWROOM SECTION -->
  <section class="showroom-page">
    <h2 class="showroom-header">SHOWROOM</h2>

    <!-- Category Filter -->
    <div class="filter-bar">
      <button class="category-btn active" data-category="all">All Hats</button>
      <button class="category-btn" data-category="snapback">Snapbacks</button>
      <button class="category-btn" data-category="trucker">Trucker</button>
      <button class="category-btn" data-category="beanies">Beanies</button>
      <button class="category-btn" data-category="caps">Caps</button>
    </div>

    <!-- Cart bar -->
    <div class="cart-bar">
      <a href="/cart" class="cart-link">
        🛒 Cart <span class="cart-count-badge" id="cartCount">0</span>
      </a>
    </div>

    <!-- Hat Grid -->
    <div class="hat-grid" id="hatGrid">
      <p class="loading-state">Loading hats...</p>
    </div>

    <!-- No Results -->
    <div id="noResults" class="no-results">
      No hats found in this category.
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-info">
      <div>
        <h4>Find Us</h4>
        <p>Based in Kingston<br />Operating on the campuses of UWI and UTECH</p>
      </div>
      <div>
        <h4>Contact</h4>
        <p>cahstopcap@gmail.com</p>
        <a href="https://www.instagram.com/cahstopcap?igsh=MWJseGo2M2pxcWp1eg==" target="_blank">
          <img src="static/assets/instagram.png" class="ig-logo" alt="Instagram" />
        </a>
      </div>
    </div>
    <p class="credit">done by maya-fay</p>
  </footer>

  <script>
    let activeCategory = 'all';

    // ── Fetch hats from API and render ──────────────────────────────
    async function loadHats(category) {
      const grid = document.getElementById('hatGrid');
      const noResults = document.getElementById('noResults');

      grid.innerHTML = '<p class="loading-state">Loading hats...</p>';
      noResults.style.display = 'none';

      try {
        const params = new URLSearchParams();
        if (category && category !== 'all') params.set('category', category);

        const res = await fetch(`/api/hats?${params.toString()}`);
        if (!res.ok) throw new Error('Failed to fetch hats');

        const hats = await res.json();
        renderHats(hats);
      } catch (err) {
        grid.innerHTML = '<p class="loading-state">Could not load hats. Please try again.</p>';
        console.error(err);
      }
    }

    function renderHats(hats) {
      const grid = document.getElementById('hatGrid');
      const noResults = document.getElementById('noResults');

      grid.innerHTML = '';

      if (hats.length === 0) {
        noResults.style.display = 'block';
        return;
      }

      noResults.style.display = 'none';

      hats.forEach(hat => {
        const card = document.createElement('div');
        card.className = 'hat-card';

        const price = hat.price.toLocaleString('en-US', {
          style: 'currency',
          currency: 'USD',
          minimumFractionDigits: 0
        });

        const imgSrc = hat.image_url || 'static/assets/placeholder.jpg';

        card.innerHTML = `
          <div class="hat-card-image">
            <img src="${imgSrc}" alt="${hat.name}" loading="lazy" />
          </div>
          <div class="hat-card-info">
            <h3 class="hat-name">${hat.name}</h3>
            <p class="hat-price">${price}</p>
          </div>
          <div class="hat-card-actions">
            <button class="cart-button" data-hat-id="${hat.id}">Add to Cart</button>
            <a href="/hat/${hat.id}" class="more-details">View Details</a>
          </div>
        `;

        // Add to cart handler
        card.querySelector('.cart-button').addEventListener('click', () => addToCart(hat.id));

        grid.appendChild(card);
      });
    }

    // ── Category filter buttons ──────────────────────────────────────
    document.querySelectorAll('.category-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = btn.dataset.category;
        loadHats(activeCategory);
      });
    });

    // ── Cart ─────────────────────────────────────────────────────────
    function getCart() {
      return JSON.parse(localStorage.getItem('cart') || '[]');
    }

    function saveCart(cart) {
      localStorage.setItem('cart', JSON.stringify(cart));
      document.getElementById('cartCount').textContent = cart.length;
    }

    function addToCart(hatId) {
      const cart = getCart();
      if (!cart.includes(hatId)) cart.push(hatId);
      saveCart(cart);
    }

    // ── Init ─────────────────────────────────────────────────────────
    document.getElementById('cartCount').textContent = getCart().length;
    loadHats('all');
  </script>
</body>
</html>
