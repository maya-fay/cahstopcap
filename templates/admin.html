<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CahStopCap - Owner Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/admin.css" />
</head>
<body class="index admin-body">

  <header class="admin-header">
    <div class="admin-header-title">
      <a href="/"><img src="/static/logo.png" alt="CahStopCap Logo" class="admin-header-logo" /></a>
      <h1>Owner Dashboard</h1>
    </div>
    <a href="/admin/logout" class="admin-logout-link">Log Out</a>
  </header>

  <nav class="admin-tabs">
    <button class="admin-tab-btn active" data-tab="orders">Orders</button>
    <button class="admin-tab-btn" data-tab="hats">Hats</button>
  </nav>

  <main class="admin-main">
    <!-- ORDERS TAB -->
    <section id="ordersTab" class="admin-tab-panel active">
      <div class="orders-board" id="ordersBoard">
        <div class="orders-column" data-status="placed">
          <h3>Placed</h3>
          <div class="orders-column-list" data-status-list="placed"></div>
        </div>
        <div class="orders-column" data-status="processing">
          <h3>Processing</h3>
          <div class="orders-column-list" data-status-list="processing"></div>
        </div>
        <div class="orders-column" data-status="out_for_delivery">
          <h3>Out for Delivery</h3>
          <div class="orders-column-list" data-status-list="out_for_delivery"></div>
        </div>
        <div class="orders-column" data-status="completed">
          <h3>Completed</h3>
          <div class="orders-column-list" data-status-list="completed"></div>
        </div>
      </div>
    </section>

    <!-- HATS TAB -->
    <section id="hatsTab" class="admin-tab-panel">
      <div class="hat-form-wrap">
        <h3>Add New Hat</h3>
        <form id="addHatForm" class="hat-form">
          <label>
            Name <span class="required-marker">*</span>
            <input type="text" name="name" required />
          </label>
          <label>
            Price <span class="required-marker">*</span>
            <input type="number" name="price" min="0" step="0.01" required />
          </label>
          <label>
            Brand
            <input type="text" name="brand" />
          </label>
          <label>
            Category
            <input type="text" name="category" />
          </label>
          <label>
            Size
            <input type="text" name="size" />
          </label>
          <label>
            Color
            <input type="text" name="color" />
          </label>
          <label>
            Material
            <input type="text" name="material" />
          </label>
          <label>
            Image URL
            <input type="text" name="image_url" placeholder="static/assets/yourimage.jpg" />
          </label>
          <label>
            Stock Quantity
            <input type="number" name="stock_quantity" min="0" step="1" value="0" />
          </label>
          <label class="hat-form-checkbox">
            <input type="checkbox" name="is_available" checked />
            Available in store
          </label>
          <button type="submit" class="hat-save-btn">Add Hat</button>
          <p id="addHatError" class="admin-form-error" style="display:none;"></p>
        </form>
      </div>

      <div class="hats-table-wrap">
        <table class="hats-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Brand</th>
              <th>Price</th>
              <th>Stock Qty</th>
              <th>Available</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="hatsTableBody">
            <tr><td colspan="7" class="admin-loading">Loading hats...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const ORDER_STATUSES = ['placed', 'processing', 'out_for_delivery', 'completed'];
    const STATUS_LABELS = {
      placed: 'Placed',
      processing: 'Processing',
      out_for_delivery: 'Out for Delivery',
      completed: 'Completed'
    };

    function resolveImagePath(url) {
      if (!url) return '/static/assets/placeholder.jpg';
      if (url.startsWith('http') || url.startsWith('/')) return url;
      return '/' + url;
    }

    async function apiFetch(url, options) {
      const res = await fetch(url, options);
      if (res.status === 401) {
        window.location.href = '/admin/login';
        throw new Error('Not authenticated');
      }
      return res;
    }

    // ── Tabs ─────────────────────────────────────────────────────────
    document.querySelectorAll('.admin-tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.admin-tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
      });
    });

    // ── Orders ───────────────────────────────────────────────────────
    async function loadOrders() {
      const res = await apiFetch('/api/admin/orders');
      const orders = await res.json();

      ORDER_STATUSES.forEach(status => {
        const list = document.querySelector(`[data-status-list="${status}"]`);
        list.innerHTML = '';
      });

      orders.forEach(order => {
        const list = document.querySelector(`[data-status-list="${order.status}"]`);
        if (!list) return;

        const card = document.createElement('div');
        card.className = 'order-card';

        const itemsHtml = order.items.map(i => `<li>${i.quantity} &times; ${i.hat_name}</li>`).join('');
        const createdDate = new Date(order.created_at).toLocaleString();

        const optionsHtml = ORDER_STATUSES.map(s =>
          `<option value="${s}" ${s === order.status ? 'selected' : ''}>${STATUS_LABELS[s]}</option>`
        ).join('');

        const fulfillmentLabel = order.fulfillment_type === 'delivery' ? 'Delivery' : 'Pickup';

        card.innerHTML = `
          <div class="order-card-header">
            <strong>#${order.id}</strong>
            <span>$${Number(order.total_price).toFixed(2)}</span>
          </div>
          <p class="order-customer">${order.customer_name}</p>
          <p class="order-date">${createdDate}</p>
          <p class="order-contact">${order.customer_email || ''}</p>
          <p class="order-contact">${order.customer_phone || ''}</p>
          ${order.instagram_handle ? `<p class="order-contact">${order.instagram_handle}</p>` : ''}
          <p class="order-fulfillment">${fulfillmentLabel}${order.fulfillment_type === 'delivery' && order.delivery_address ? `: ${order.delivery_address}` : ''}</p>
          <ul class="order-items">${itemsHtml}</ul>
          <select class="order-status-select" data-order-id="${order.id}">${optionsHtml}</select>
        `;

        card.querySelector('.order-status-select').addEventListener('change', (e) => {
          updateOrderStatus(order.id, e.target.value);
        });

        list.appendChild(card);
      });
    }

    async function updateOrderStatus(orderId, status) {
      const res = await apiFetch(`/api/admin/orders/${orderId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });

      if (!res.ok) {
        alert('Could not update order status.');
      }

      loadOrders();
    }

    // ── Hats ─────────────────────────────────────────────────────────
    async function loadHats() {
      const res = await apiFetch('/api/admin/hats');
      const hats = await res.json();
      const tbody = document.getElementById('hatsTableBody');
      tbody.innerHTML = '';

      hats.forEach(hat => {
        const tr = document.createElement('tr');
        tr.dataset.hatId = hat.id;

        tr.innerHTML = `
          <td><img src="${resolveImagePath(hat.image_url)}" alt="${hat.name}" class="hats-table-image" /></td>
          <td><input type="text" class="hat-field" data-field="name" value="${hat.name}" /></td>
          <td>${hat.brand || ''}</td>
          <td><input type="number" class="hat-field" data-field="price" value="${hat.price}" min="0" step="0.01" /></td>
          <td><input type="number" class="hat-field" data-field="stock_quantity" value="${hat.stock_quantity}" min="0" step="1" /></td>
          <td><input type="checkbox" class="hat-field" data-field="is_available" ${hat.is_available ? 'checked' : ''} /></td>
          <td><button class="hat-save-btn">Save</button></td>
        `;

        tr.querySelector('.hat-save-btn').addEventListener('click', () => saveHat(hat.id, tr));

        tbody.appendChild(tr);
      });
    }

    async function saveHat(hatId, row) {
      const payload = {
        name: row.querySelector('[data-field="name"]').value,
        price: parseFloat(row.querySelector('[data-field="price"]').value),
        stock_quantity: parseInt(row.querySelector('[data-field="stock_quantity"]').value, 10),
        is_available: row.querySelector('[data-field="is_available"]').checked
      };

      const btn = row.querySelector('.hat-save-btn');
      btn.textContent = 'Saving...';
      btn.disabled = true;

      try {
        const res = await apiFetch(`/api/admin/hats/${hatId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.detail || 'Could not save hat');
        }

        btn.textContent = 'Saved';
        setTimeout(() => { btn.textContent = 'Save'; btn.disabled = false; }, 1200);
      } catch (err) {
        alert(err.message);
        btn.textContent = 'Save';
        btn.disabled = false;
      }
    }

    // ── Add Hat ──────────────────────────────────────────────────────
    document.getElementById('addHatForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const errorEl = document.getElementById('addHatError');
      errorEl.style.display = 'none';

      const name = form.name.value.trim();
      const price = parseFloat(form.price.value);

      if (!name) {
        errorEl.textContent = 'Name is required.';
        errorEl.style.display = 'block';
        return;
      }

      if (isNaN(price) || price < 0) {
        errorEl.textContent = 'Please enter a valid price.';
        errorEl.style.display = 'block';
        return;
      }

      const payload = {
        name,
        price,
        brand: form.brand.value.trim() || null,
        category: form.category.value.trim() || null,
        size: form.size.value.trim() || null,
        color: form.color.value.trim() || null,
        material: form.material.value.trim() || null,
        image_url: form.image_url.value.trim() || null,
        stock_quantity: parseInt(form.stock_quantity.value, 10) || 0,
        is_available: form.is_available.checked,
      };

      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Adding...';

      try {
        const res = await apiFetch('/api/admin/hats', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Could not add hat');

        form.reset();
        form.is_available.checked = true;
        loadHats();
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Add Hat';
      }
    });

    loadOrders();
    loadHats();
  </script>
</body>
</html>
